<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuhan Sun</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .role {
      font-size: 16px;
      color: #555;
      margin-bottom: 4px;
    }
    .affil {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
    }
    .divider {
      width: 32px;
      height: 1px;
      background: #ddd;
      margin: 0 auto 40px;
    }
    .message {
      font-size: 15px;
      color: #666;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yuhan Sun</h1>
    <p class="role">Computer Science · Zhiyuan Honors Program</p>
    <p class="affil">Shanghai Jiao Tong University</p>
    <div class="divider"></div>
    <p class="message">Site under construction.</p>
  </div>
</body>
</html>
